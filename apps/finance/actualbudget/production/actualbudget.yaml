apiVersion: apps.netamos.com/v1alpha2
kind: Application
metadata:
  name: actualbudget
spec:
  source:
    kind: image
    reference: docker.io/actualbudget/actual-server:latest-alpine
  port: 5006
  domains:
    - budget.khuedoan.com
    - budget.production.khuedoan.com
  env:
    ACTUAL_LOGIN_METHOD: openid
    ACTUAL_OPENID_DISCOVERY_URL: https://dex.production.khuedoan.com/.well-known/openid-configuration
    ACTUAL_OPENID_CLIENT_ID: actualbudget
    ACTUAL_OPENID_SERVER_HOSTNAME: https://budget.khuedoan.com
    ACTUAL_USER_CREATION_MODE: login
    ACTUAL_OPENID_CLIENT_SECRET: vault:secret/data/actualbudget/auth#client_secret
  volume:
    mountPath: /data
    size: 1Gi

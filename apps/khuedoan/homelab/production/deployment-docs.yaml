apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docs
        istio.io/dataplane-mode: ambient
    spec:
      containers:
      - image: registry.registry.svc.cluster.local/khuedoan/homelab:2392e1ab46dfee3bc5ef200bea5b2d44ad7b0be9
        name: docs
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 3

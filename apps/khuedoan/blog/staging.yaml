defaultPodOptions:
  labels:
    istio.io/dataplane-mode: ambient
controllers:
  main:
    replicas: 2
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: registry.registry.svc.cluster.local/khuedoan/blog
          tag: 2c3e9c2aa204804e00db4234628f00cde03303a7
service:
  main:
    controller: main
    ports:
      http:
        port: 3000
        protocol: HTTP
route:
  main:
    kind: HTTPRoute
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: gateway
        namespace: istio-system
    hostnames:
      - www.staging.khuedoan.com
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: main
            port: 3000

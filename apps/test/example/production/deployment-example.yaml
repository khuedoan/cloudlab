apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: example
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: example
        image: registry.registry.svc.cluster.local/apps/khuedoan/example-service:57400e1ccfccb4455f113d91c0aacc9172fffc7c
        name: example
        ports:
        - containerPort: 8080
          name: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: example
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example
        istio.io/dataplane-mode: ambient
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: example
        image: registry.registry.svc.cluster.local/test/example:6c1c137dc62db2f60d666f593d930fad94a846ca
        name: example
        ports:
        - containerPort: 8080
          name: http

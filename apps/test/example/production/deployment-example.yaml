apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: example
  template:
    metadata:
      labels:
        app.kubernetes.io/name: example
        istio.io/dataplane-mode: ambient
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: example
        image: registry.registry.svc.cluster.local/apps/khuedoan/example-service:49a48eff6d01c5534eea39b18ccfe5b08b01a86f
        name: example
        ports:
        - containerPort: 8080
          name: http

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: example
  namespace: test-example-staging
spec:
  hostnames:
  - example.staging.khuedoan.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway
    namespace: istio-system
  rules:
  - backendRefs:
    - name: example
      port: 8080
    matches:
    - path:
        type: PathPrefix
        value: /

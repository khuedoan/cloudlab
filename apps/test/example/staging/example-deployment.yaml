apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
  annotations:
    netamos.com/branch: master
    netamos.com/repository: khuedoan/example-service
    netamos.com/source: git
  labels:
    app.kubernetes.io/component: app
    app.kubernetes.io/instance: example
    app.kubernetes.io/managed-by: netamos
    app.kubernetes.io/name: example
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/instance: example
  template:
    metadata:
      annotations:
        netamos.com/branch: master
        netamos.com/repository: khuedoan/example-service
        netamos.com/source: git
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/instance: example
        app.kubernetes.io/managed-by: netamos
        app.kubernetes.io/name: example
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: example
        image: registry.registry.svc.cluster.local/apps/khuedoan/example-service:49a48eff6d01c5534eea39b18ccfe5b08b01a86f
        name: example
        ports:
        - containerPort: 8080
          name: http

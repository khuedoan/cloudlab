apiVersion: apps.netamos.com/v1alpha1
kind: Application
metadata:
  name: example
spec:
  source:
    kind: git
    repository: khuedoan/example-service
    branch: master
  image: registry.registry.svc.cluster.local/apps/khuedoan/example-service:49a48eff6d01c5534eea39b18ccfe5b08b01a86f
  replicas: 2
  port: 8080
  domains:
    - example.staging.khuedoan.com
  env:
    - key: EXAMPLE_SECRET
      value: vault:secret/data/test/example#MOCK_API_KEY
      source: Secret

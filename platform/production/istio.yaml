apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: istio
  namespace: flux-system
spec:
  interval: 1h
  url: https://istio-release.storage.googleapis.com/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: flux-system
spec:
  interval: 3m
  dependsOn:
    - name: platform-namespaces
  chart:
    spec:
      chart: base
      version: 1.25.1
      sourceRef:
        kind: HelmRepository
        name: istio
  releaseName: istio-base
  targetNamespace: istio-system
  install:
    createNamespace: true
    remediation:
      retries: -1
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: flux-system
spec:
  interval: 3m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: cni
      version: 1.25.1
      sourceRef:
        kind: HelmRepository
        name: istio
  releaseName: istio-cni
  targetNamespace: istio-system
  install:
    remediation:
      retries: -1
  values:
    global:
      platform: k3s
    profile: ambient
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: flux-system
spec:
  interval: 3m
  dependsOn:
    - name: istio-cni
  chart:
    spec:
      chart: ztunnel
      version: 1.25.1
      sourceRef:
        kind: HelmRepository
        name: istio
  releaseName: ztunnel
  targetNamespace: istio-system
  install:
    remediation:
      retries: -1
  values:
    profile: ambient
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: flux-system
spec:
  interval: 3m
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: 1.25.1
      sourceRef:
        kind: HelmRepository
        name: istio
  releaseName: istiod
  targetNamespace: istio-system
  install:
    remediation:
      retries: -1
  values:
    profile: ambient
    pilot:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-metrics
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: istiod
    - name: prometheus
  releaseName: istio-metrics
  targetNamespace: istio-system
  install:
    createNamespace: true
    remediation:
      retries: -1
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  values:
    rawResources:
      component-monitor:
        apiVersion: monitoring.coreos.com/v1
        kind: ServiceMonitor
        forceRename: istio-component-monitor
        spec:
          spec:
            jobLabel: istio
            targetLabels:
              - app
            selector:
              matchExpressions:
                - key: istio
                  operator: In
                  values:
                    - pilot
            namespaceSelector:
              any: true
            endpoints:
              - port: http-monitoring
                interval: 15s
      envoy-stats-monitor:
        apiVersion: monitoring.coreos.com/v1
        kind: PodMonitor
        forceRename: istio-envoy-stats
        spec:
          spec:
            selector:
              matchExpressions:
                - key: istio-prometheus-ignore
                  operator: DoesNotExist
            namespaceSelector:
              any: true
            jobLabel: envoy-stats
            podMetricsEndpoints:
              - path: /stats/prometheus
                interval: 15s
                relabelings:
                  - action: keep
                    sourceLabels:
                      - __meta_kubernetes_pod_container_name
                    regex: istio-proxy
                  - action: keep
                    sourceLabels:
                      - __meta_kubernetes_pod_annotationpresent_prometheus_io_scrape
                  - action: replace
                    regex: '(\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})'
                    replacement: '[$2]:$1'
                    sourceLabels:
                      - __meta_kubernetes_pod_annotation_prometheus_io_port
                      - __meta_kubernetes_pod_ip
                    targetLabel: __address__
                  - action: replace
                    regex: '(\d+);((([0-9]+?)(\.|$)){4})'
                    replacement: $2:$1
                    sourceLabels:
                      - __meta_kubernetes_pod_annotation_prometheus_io_port
                      - __meta_kubernetes_pod_ip
                    targetLabel: __address__
                  - action: labeldrop
                    regex: __meta_kubernetes_pod_label_(.+)
                  - action: replace
                    sourceLabels:
                      - __meta_kubernetes_namespace
                    targetLabel: namespace
                  - action: replace
                    sourceLabels:
                      - __meta_kubernetes_pod_name
                    targetLabel: pod
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-gateway
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager-config
    - name: istiod
  releaseName: istio-gateway
  targetNamespace: istio-system
  install:
    createNamespace: true
    remediation:
      retries: -1
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  values:
    rawResources:
      gateway:
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        forceRename: gateway
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt
        spec:
          spec:
            gatewayClassName: istio
            listeners:
              - name: https
                # TODO configurable
                hostname: "*.production.khuedoan.com"
                port: 443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - name: wildcard-tls
                allowedRoutes:
                  namespaces:
                    from: All
              - name: khuedoan-com
                hostname: "*.khuedoan.com"
                port: 443
                protocol: HTTPS
                tls:
                  certificateRefs:
                    - name: khuedoan-com-wildcard-tls
                allowedRoutes:
                  namespaces:
                    from: All

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: volsync
  namespace: flux-system
spec:
  type: oci
  insecure: true
  interval: 1h
  url: oci://registry.registry.svc.cluster.local/vendor/charts/volsync
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
  chart:
    spec:
      chart: volsync
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: volsync
  releaseName: volsync
  targetNamespace: volsync-system
  install:
    createNamespace: true
    remediation:
      retries: -1

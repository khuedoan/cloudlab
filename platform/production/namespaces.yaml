apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: platform-namespaces
  namespace: flux-system
spec:
  interval: 30m
  releaseName: platform-namespaces
  targetNamespace: flux-system
  install:
    remediation:
      retries: -1
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  values:
    rawResources:
      cert-manager:
        apiVersion: v1
        kind: Namespace
        forceRename: cert-manager
        spec: {}
      cnpg-system:
        apiVersion: v1
        kind: Namespace
        forceRename: cnpg-system
        spec: {}
      dex:
        apiVersion: v1
        kind: Namespace
        forceRename: dex
        labels:
          istio.io/dataplane-mode: ambient
        spec: {}
      forgejo:
        apiVersion: v1
        kind: Namespace
        forceRename: forgejo
        annotations:
          volsync.backube/privileged-movers: "true"
        spec: {}
      istio-system:
        apiVersion: v1
        kind: Namespace
        forceRename: istio-system
        spec: {}
      monitoring:
        apiVersion: v1
        kind: Namespace
        forceRename: monitoring
        spec: {}
      temporal:
        apiVersion: v1
        kind: Namespace
        forceRename: temporal
        labels:
          istio.io/dataplane-mode: ambient
        spec: {}
      netamos:
        apiVersion: v1
        kind: Namespace
        forceRename: netamos
        labels:
          istio.io/dataplane-mode: ambient
        spec: {}

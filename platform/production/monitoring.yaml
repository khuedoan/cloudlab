apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  releaseName: prometheus
  targetNamespace: monitoring
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  values:
    grafana:
      additionalDataSources:
        - name: Loki
          type: loki
          url: http://loki:3100
      enabled: false
      forceDeployDashboards: true
      forceDeployDatasources: true
    prometheus:
      prometheusSpec:
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: prometheus
  chart:
    spec:
      chart: loki
      version: 17.0.1
      sourceRef:
        kind: HelmRepository
        name: loki
  releaseName: loki
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: -1
  values:
    loki:
      auth_enabled: false
      commonConfig:
        instance_addr: ${POD_IP}
        replication_factor: 1
        ring:
          kvstore:
            store: memberlist
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      storage:
        type: filesystem
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      query_scheduler:
        scheduler_ring:
          instance_addr: ${POD_IP}
          kvstore:
            store: memberlist
    singleBinary:
      replicas: 1
      sidecar: false
      persistence:
        enabled: true
        size: 10Gi
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: loki
    - name: prometheus
  chart:
    spec:
      chart: vector
      version: 0.52.0
      sourceRef:
        kind: HelmRepository
        name: vector
  releaseName: vector
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: -1
  values:
    role: Agent
    livenessProbe:
      grpc:
        port: 8686
    readinessProbe:
      grpc:
        port: 8686
    env:
      - name: KUBERNETES_SERVICE_HOST
        value: kubernetes.default.svc
      - name: KUBERNETES_SERVICE_PORT
        value: "443"
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: true
        address: "[::]:8686"
      sources:
        kubernetes_logs:
          type: kubernetes_logs
      sinks:
        loki:
          type: loki
          inputs:
            - kubernetes_logs
          endpoint: http://loki:3100
          path: /loki/api/v1/push
          encoding:
            codec: raw_message
          labels:
            cluster: production
            namespace: '{{ "{{ kubernetes.pod_namespace }}" }}'
            pod: '{{ "{{ kubernetes.pod_name }}" }}'
            container: '{{ "{{ kubernetes.container_name }}" }}'
            node: '{{ "{{ kubernetes.pod_node_name }}" }}'
            stream: '{{ "{{ stream }}" }}'
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-secrets
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
    - name: vault
    - name: vault-secrets-webhook
  releaseName: grafana-secrets
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: -1
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  values:
    rawResources:
      grafana-secrets:
        apiVersion: v1
        kind: Secret
        forceRename: grafana-secrets
        annotations:
          vault.security.banzaicloud.io/vault-addr: http://vault.vault.svc.cluster.local:8200
          vault.security.banzaicloud.io/vault-role: default
          vault.security.banzaicloud.io/vault-path: kubernetes
        spec:
          stringData:
            SSO_CLIENT_SECRET: vault:secret/data/grafana/oauth#client_secret
            CLICKHOUSE_PASSWORD: vault:secret/data/clickhouse/credentials#grafana_password
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: dex
    - name: grafana-secrets
    - name: prometheus
  chart:
    spec:
      chart: grafana
      version: 12.4.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  releaseName: grafana
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: -1
  values:
    plugins:
      - grafana-clickhouse-datasource@4.19.0
    datasources:
      clickhouse.yaml:
        apiVersion: 1
        datasources:
          - name: ClickHouse
            type: grafana-clickhouse-datasource
            access: proxy
            jsonData:
              defaultDatabase: default
              host: clickhouse-clickhouse-headless.monitoring.svc.cluster.local
              port: 9000
              protocol: native
              username: grafana
              logs:
                defaultDatabase: default
                defaultTable: otel_logs
                otelEnabled: true
              traces:
                defaultDatabase: default
                defaultTable: otel_traces
                otelEnabled: true
            secureJsonData:
              password: $CLICKHOUSE_PASSWORD
    testFramework:
      enabled: false
    sidecar:
      dashboards:
        enabled: true
      datasources:
        enabled: true
    envFromSecret: grafana-secrets
    grafana.ini:
      server:
        root_url: https://grafana.production.khuedoan.com
      auth:
        disable_login_form: true
      auth.generic_oauth:
        enabled: true
        allow_sign_up: true
        role_attribute_strict: true
        role_attribute_path: "email == 'admin@cloudlab.khuedoan.com' && 'Admin' || 'Editor'"
        name: SSO
        client_id: grafana
        client_secret: $__env{SSO_CLIENT_SECRET}
        scopes: openid profile email groups
        auth_url: https://dex.production.khuedoan.com/auth
        token_url: https://dex.production.khuedoan.com/token
        api_url: https://dex.production.khuedoan.com/userinfo
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-config
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: grafana
    - name: istio-gateway
  releaseName: grafana-config
  targetNamespace: monitoring
  install:
    createNamespace: true
    remediation:
      retries: -1
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  values:
    rawResources:
      grafana-route:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        forceRename: grafana
        spec:
          spec:
            parentRefs:
              - name: gateway
                namespace: istio-system
            hostnames:
              - grafana.production.khuedoan.com
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
                backendRefs:
                  - name: grafana
                    port: 80
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-secrets
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
    - name: vault
    - name: vault-secrets-webhook

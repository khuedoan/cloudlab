---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: dex
    - name: istiod
    - name: kiali-secrets
    - name: prometheus
  chart:
    spec:
      chart: kiali-server
      version: 2.26.0
      sourceRef:
        kind: HelmRepository
        name: kiali
  releaseName: kiali
  targetNamespace: istio-system
  install:
    createNamespace: true
    remediation:
      retries: -1
  values:
    deployment:
      view_only_mode: true
    auth:
      strategy: openid
      openid:
        client_id: kiali
        issuer_uri: https://dex.production.khuedoan.com
        disable_rbac: true
    external_services:
      prometheus:
        url: http://prometheus-kube-prometheus-prometheus.monitoring:9090
      grafana:
        enabled: false
    server:
      web_fqdn: kiali.production.khuedoan.com
      web_root: /
      # TODO this probably should've been handled by the gateway
      web_port: 443
      web_schema: https
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-config
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: istio-gateway
  releaseName: kiali-config
  targetNamespace: istio-system
  install:
    createNamespace: true
    remediation:

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cnpg
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://registry.registry.svc.cluster.local:5000/vendor/charts/cloudnative-pg
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
  install:
    remediation:
      retries: -1
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.28.0
      sourceRef:
        kind: HelmRepository
        name: cnpg
  releaseName: cnpg
  targetNamespace: cnpg-system
  values:
    image:
      repository: registry.registry.svc.cluster.local/vendor/images/cloudnative-pg/cloudnative-pg
      tag: 1.29.0

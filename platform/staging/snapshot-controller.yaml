apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: piraeus-charts
  namespace: flux-system
spec:
  type: oci
  insecure: true
  interval: 1h
  url: oci://registry.registry.svc.cluster.local/vendor/charts/snapshot-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: platform-namespaces
  chart:
    spec:
      chart: snapshot-controller
      version: 5.0.4
      sourceRef:
        kind: HelmRepository
        name: piraeus-charts
  releaseName: snapshot-controller
  targetNamespace: kube-system
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    installCRDs: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller-config
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: snapshot-controller
  chart:
    spec:
      chart: app-template
      version: 4.6.0
      sourceRef:
        kind: HelmRepository
        name: app-template
  releaseName: snapshot-controller-config
  targetNamespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    rawResources:
      standard-volume-snapshot-class:
        apiVersion: snapshot.storage.k8s.io/v1
        kind: VolumeSnapshotClass
        forceRename: standard
        annotations:
          snapshot.storage.kubernetes.io/is-default-class: "true"
        spec:
          driver: rook-ceph.rbd.csi.ceph.com
          deletionPolicy: Delete
          parameters:
            clusterID: rook-ceph
            csi.storage.k8s.io/snapshotter-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/snapshotter-secret-namespace: rook-ceph

apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: forgejo
  namespace: flux-system
spec:
  type: oci
  url: oci://code.forgejo.org/forgejo-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: forgejo
      version: 15.0.3
      sourceRef:
        kind: HelmRepository
        name: forgejo
  releaseName: forgejo
  targetNamespace: forgejo
  install:
    createNamespace: true
  values:
    strategy:
      type: Recreate
    deployment:
      env:
        - name: FORGEJO_OAUTH_SECRET
          value: vault:secret/data/forgejo/oauth#secret
    gitea:
      config:
        database:
          DB_TYPE: sqlite3
        session:
          PROVIDER: memory
        cache:
          ADAPTER: memory
        queue:
          TYPE: level
        server:
          LANDING_PAGE: explore
          ROOT_URL: https://code.staging.khuedoan.com
          OFFLINE_MODE: true
        repository:
          DISABLED_REPO_UNITS: repo.wiki,repo.projects,repo.packages
          DISABLE_STARS: true
          DEFAULT_BRANCH: master
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          OPENID_CONNECT_SCOPES: "email profile"
          USERNAME: username
        service:
          ENABLE_INTERNAL_SIGNIN: false
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
        "service.explore":
          DISABLE_USERS_PAGE: true
        actions:
          ENABLED: false
        webhook:
          ALLOWED_HOST_LIST: "private"
        other:
          SHOW_FOOTER_VERSION: false
          SHOW_FOOTER_TEMPLATE_LOAD_TIME: false
          SHOW_FOOTER_POWERED_BY: false
      oauth:
        - name: SSO
          provider: "openidConnect"
          autoDiscoverUrl: https://dex.staging.khuedoan.com/.well-known/openid-configuration
          key: forgejo
          # Can't use Vault syntax directly here, because it will be templated
          # into a secret, so we need to define a separate environment variable
          secret: ${FORGEJO_OAUTH_SECRET}
      admin:
        email: admin@cloudlab.khuedoan.com
        username: forgejo_admin
        password: vault:secret/data/forgejo/admin#password
      podAnnotations:
        "istio.io/dataplane-mode": "ambient"
    httpRoute:
      enabled: true
      parentRefs:
        - name: gateway
          namespace: istio-system
      hostnames:
        - code.staging.khuedoan.com
    valkey-cluster:
      enabled: false
    valkey:
      enabled: false
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
